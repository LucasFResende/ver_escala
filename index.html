<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Escala</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form id="ver_escala" action="">
        <div class="input-group mb-3">
            <label class="input-group-text" for="inputGroupFile01">Escala</label>
            <input type="file" class="form-control" id="escala" accept=".csv,.xlsx">
        </div>

        <div class="input-group mb-3">
            <label class="input-group-text" for="inputGroupFile01">Respostas</label>
            <input type="file" class="form-control" id="resposta" accept=".csv,.xlsx">
        </div>

        <div class="input-group mb-3">
            <label class="input-group-text" for="inputGroupFile01">Tabela de Conversão</label>
            <input type="file" class="form-control" id="conversao" accept=".csv,.xlsx">
        </div>
        <button id="upload" type="submit" class="btn btn-primary">Enviar</button>
    </form>

    <span id="ESCALA">
        <table id="exibirEscala" class="table table-bordered">

        </table>
    </span>

    </span id="SCRIPTS">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="ver_escala.js"></script>
    </span>

</body>

</html>
